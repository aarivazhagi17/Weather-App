<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Weather App/Weather.css">
    <title>Weather APP</title>
</head>

<body>

    <div class="container">

        <div class="weather-container">
            <div class="temp">
                <p>30</p>
            </div>
            <div class="time_location">
                <p>Hyderabad</p>
                <p>11:11 - monday 2026-06-11</p>
            </div>
            <div class="condition">
                <p></p>
                <p>Mist</p>

            </div>

        </div>


        <nav>
            <form action="">
                <input type="text" placeholder="Search for a location" class="search_area" />
                <button type="submit">Search</button>
            </form>
        </nav>
    </div>
</body>
<script src="../Weather App/Weather.js"></script>

</html>
